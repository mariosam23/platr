services:
  papers_db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: localhost
    ports:
      - "14441:5432"
    volumes:
      - papers_db:/var/lib/postgresql/data

volumes:
  papers_db:
    driver: local
