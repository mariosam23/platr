name: platr Backend CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'platr-backend/**'
  
jobs:
  lint:
    runs-on: ubuntu-latest
    environment: development
    env:
      POSTGRES_USER: postgres
      POSTGRES_DB: platr_backend_ci
      DB_URL: postgresql://postgres:test-postgres-password@localhost:5432/platr_backend_ci
      ADMIN_USERNAME: ${{ vars.ADMIN_USERNAME }}
      ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL }}
      POSTGRES_PASSWORD: test-postgres-password
      JWT_SECRET: test-jwt-secret
      ADMIN_PASSWORD: test-admin-password

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: platr-backend
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '23'
          cache: gradle
      
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      - name: Run ktlint
        run: ./gradlew ktlintCheck
      
      # - name: Run detekt
      #   run: ./gradlew detekt
      
      - name: Run Spring Boot tests
        run: ./gradlew check
      
       # - name: Run code OWASP Dependency Check
       #   run: ./gradlew dependencyCheckAnalyze
