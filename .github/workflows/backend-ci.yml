name: platr Backend CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'platr-backend/**'
  
jobs:
  lint:
    runs-on: ubuntu-latest
    environment: development

    defaults:
      run:
        working-directory: platr-backend
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '23'
          cache: gradle
      
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      - name: Run ktlint
        run: ./gradlew ktlintCheck
      
      # - name: Run detekt
      #   run: ./gradlew detekt
      
      - name: Run Spring Boot tests
        run: ./gradlew check
      
      # - name: Run code OWASP Dependency Check
      #   run: ./gradlew dependencyCheckAnalyze
